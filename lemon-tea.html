<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>柠家小铺</title>
<style>
:root {
  --green: #2d5016;
  --green-dark: #1e350e;
  --green-light: #4a7c3f;
  --green-bg: #eef4ea;
  --cream: #faf7f2;
  --card: #ffffff;
  --text: #1a1a1a;
  --text-secondary: #8c8c8c;
  --text-muted: #bfbfbf;
  --border: #e8e5df;
  --border-light: #f2f0eb;
  --shadow-xs: 0 1px 2px rgba(0,0,0,.02);
  --shadow-sm: 0 2px 8px rgba(0,0,0,.04);
  --shadow-md: 0 6px 24px rgba(0,0,0,.06);
  --shadow-lg: 0 16px 48px rgba(0,0,0,.08);
  --shadow-glow: 0 0 0 1px rgba(45,80,22,.06), 0 2px 12px rgba(45,80,22,.08);
  --shadow-lift: 0 8px 30px rgba(0,0,0,.07), 0 2px 8px rgba(0,0,0,.04);
  --card-gradient: linear-gradient(135deg, #ffffff 0%, #fdfdfb 100%);
  --modal-glass: rgba(255,255,255,.94);
  --radius: 20px;
  --radius-lg: 28px;
  --radius-sm: 14px;
  --font-serif: 'Georgia', 'Noto Serif SC', 'PingFang SC', serif;
  --font-sans: 'PingFang SC', 'Microsoft YaHei', -apple-system, sans-serif;
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; -webkit-tap-highlight-color:transparent; }
body {
  font-family: var(--font-sans);
  background: linear-gradient(180deg, #faf7f2 0%, #f4efe6 40%, #efe9dd 100%);
  color: var(--text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}
.wrap { max-width:480px; margin:0 auto; min-height:100vh; }

/* ── Hero ── */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}
.hero-brand {
  flex: 0 0 38%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  gap: 10px;
  padding: 0 20px 16px;
  z-index: 1;
}
.hero-name {
  font-family: var(--font-serif);
  font-size: 36px;
  font-weight: 700;
  color: var(--green-dark);
  letter-spacing: 14px;
  text-shadow: 0 2px 8px rgba(30,53,14,.06);
}
.hero-line {
  width: 30px;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--green), transparent);
  border-radius: 1px;
}
.hero-slogan {
  font-size: 12px;
  color: var(--text-secondary);
  letter-spacing: 3px;
  font-weight: 400;
  opacity: .8;
}
.hero-intro {
  font-size: 11px;
  color: var(--text-muted);
  text-align: center;
  line-height: 1.7;
  letter-spacing: 1px;
  max-width: 260px;
  white-space: pre-line;
}
.hero-pill {
  display: inline-block;
  padding: 5px 16px;
  border-radius: 20px;
  background: rgba(255,255,255,.45);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  font-size: 11px;
  color: var(--text-secondary);
  letter-spacing: 1px;
  border: 1px solid rgba(0,0,0,.04);
}
.hero-badges {
  display: flex;
  gap: 12px;
  font-size: 10px;
  color: var(--text-secondary);
  letter-spacing: .5px;
  opacity: .75;
}
.hero-stats {
  display: inline-block;
  padding: 6px 18px;
  border-radius: 20px;
  background: rgba(255,255,255,.55);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  font-size: 10px;
  color: var(--text-secondary);
  letter-spacing: 1px;
  border: 1px solid rgba(0,0,0,.04);
}
.hero-grid {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding: 16px 14px 28px;
  overflow: hidden;
  justify-content: center;
}
.marquee-row {
  overflow: hidden;
  position: relative;
  display: flex;
  align-items: center;
  padding: 6px 0;
}
.marquee-row::before,
.marquee-row::after {
  content: '';
  position: absolute;
  top: 0;
  bottom: 0;
  width: 20px;
  z-index: 2;
  pointer-events: none;
}
.marquee-row::before {
  left: 0;
  background: linear-gradient(to right, rgba(250,247,242,.7), transparent);
}
.marquee-row::after {
  right: 0;
  background: linear-gradient(to left, rgba(250,247,242,.7), transparent);
}
.marquee-track {
  display: flex;
  gap: 10px;
  will-change: transform;
}
.row-fwd .marquee-track {
  animation: scrollLeft 28s linear infinite;
}
.row-rev .marquee-track {
  animation: scrollRight 28s linear infinite;
}
.marquee-row:hover .marquee-track {
  animation-play-state: paused;
}
@keyframes scrollLeft {
  0%   { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}
@keyframes scrollRight {
  0%   { transform: translateX(-50%); }
  100% { transform: translateX(0); }
}
.grid-cell {
  width: 115px;
  height: 115px;
  border-radius: 16px;
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  padding: 10px 6px;
  border: 1px dashed rgba(45,80,22,.08);
  transition: transform .35s cubic-bezier(.4,0,.2,1), box-shadow .35s ease, border-color .35s ease;
}
.grid-cell:hover {
  transform: scale(1.05);
  box-shadow: 0 6px 20px rgba(30,53,14,.1);
  border-color: rgba(45,80,22,.2);
  z-index: 3;
}
.grid-cell::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 65% 35%, rgba(255,255,255,.3) 0%, transparent 55%);
  border-radius: inherit;
  pointer-events: none;
}
.cell-emoji {
  font-size: 28px;
  line-height: 1;
  position: relative;
  z-index: 1;
}
.cell-name {
  font-size: 9.5px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: .5px;
  text-align: center;
  line-height: 1.2;
  position: relative;
  z-index: 1;
  max-width: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.cell-price {
  font-size: 10px;
  font-weight: 700;
  color: var(--green-dark);
  font-family: var(--font-serif);
  position: relative;
  z-index: 1;
}

/* ── Card Flash ── */
.pcard.flash {
  animation: cardFlash .7s ease;
}
@keyframes cardFlash {
  0%   { box-shadow: 0 0 0 0 rgba(45,80,22,.35); background: #fafdf7; }
  40%  { box-shadow: 0 0 0 10px rgba(45,80,22,.12); background: #f6faf2; }
  100% { box-shadow: 0 0 0 0 rgba(45,80,22,0); }
}

/* ── Scroll Hint ── */
.scroll-hint {
  position: absolute;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  opacity: .5;
  animation: hintPulse 2s ease-in-out infinite;
}
.scroll-hint span {
  font-size: 10px;
  color: var(--text-secondary);
  letter-spacing: 2px;
}
.scroll-hint svg {
  width: 18px;
  height: 18px;
  stroke: var(--text-secondary);
}
@keyframes hintPulse {
  0%, 100% { opacity: .3; transform: translateX(-50%) translateY(0); }
  50%      { opacity: .7; transform: translateX(-50%) translateY(6px); }
}

/* ── Header ── */
.header {
  position: relative;
  padding: 44px 20px 28px;
  text-align: center;
  transition: padding .35s ease;
}
.header.small { padding: 16px 20px 12px; }
.brand-wrap { position:relative; z-index:1; }
.brand {
  font-family: var(--font-serif);
  font-size: 32px;
  font-weight: 700;
  color: var(--green-dark);
  letter-spacing: 10px;
  transition: all .35s ease;
}
.header.small .brand { font-size: 17px; letter-spacing: 4px; }
.brand-line {
  display: block;
  width: 28px;
  height: 2px;
  background: var(--green);
  margin: 12px auto;
  border-radius: 1px;
  transition: all .35s ease;
}
.header.small .brand-line { width:0; margin:0 auto; opacity:0; }
.slogan {
  display: inline-block;
  margin-top: 2px;
  color: var(--text-secondary);
  font-size: 11px;
  letter-spacing: 3px;
  transition: all .35s ease;
  font-weight: 400;
}
.header.small .slogan { opacity:0; transform:translateY(-6px); pointer-events:none; }

.fav-btn {
  position: absolute;
  top: 16px;
  right: 16px;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--card);
  border: 1px solid var(--border);
  font-size: 16px;
  cursor: pointer;
  z-index: 2;
  transition: all .25s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.fav-btn.liked { color: #e74c3c; animation: heartPop .5s cubic-bezier(.17,.89,.32,1.49); }
@keyframes heartPop {
  0%,100% { transform:scale(1); }
  30% { transform:scale(1.25); }
  60% { transform:scale(.92); }
}

/* ── Divider ── */
.divider {
  height: 1px;
  background: var(--border);
  margin: 0 14px;
}

/* ── Highlights ── */
.highlights {
  display: flex;
  gap: 0;
  margin: 0 14px;
  padding: 14px 0;
}
.hi {
  flex: 1;
  text-align: center;
  font-size: 10.5px;
  color: var(--text-secondary);
  letter-spacing: .5px;
  font-weight: 500;
}
.hi + .hi { border-left: 1px solid var(--border-light); }

/* ── Categories ── */
.cats {
  display: flex;
  gap: 8px;
  padding: 18px 14px 6px;
  overflow-x: auto;
  scrollbar-width: none;
}
.cats::-webkit-scrollbar { display:none; }
.ct {
  padding: 9px 18px;
  border-radius: 22px;
  font-size: 12.5px;
  font-weight: 500;
  cursor: pointer;
  background: var(--card);
  color: var(--text-secondary);
  border: 1px solid var(--border);
  white-space: nowrap;
  transition: all .25s ease;
  letter-spacing: 1px;
}
.ct:hover {
  background: #f7f5f0;
  border-color: #d5d2cb;
}

.ct.active {
  background: var(--green-dark);
  color: #e8f0e2;
  border-color: var(--green-dark);
  box-shadow: 0 4px 14px rgba(30,53,14,.18);
  font-weight: 600;
}

/* ── Featured Section ── */
.feat-wrap {
  padding: 8px 0 2px;
}
.feat-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 14px;
  margin-bottom: 10px;
}
.feat-title {
  font-family: var(--font-serif);
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 2px;
}
.feat-badge {
  font-size: 10px;
  padding: 2px 10px;
  border-radius: 10px;
  background: linear-gradient(135deg, #f5ede0, #f0e6d4);
  color: #b8783e;
  font-weight: 600;
  letter-spacing: .5px;
}
.feat-new-badge {
  font-size: 10px;
  padding: 2px 10px;
  border-radius: 10px;
  background: linear-gradient(135deg, #fff0e8, #ffe0d0);
  color: #e0582e;
  font-weight: 600;
  letter-spacing: .5px;
  cursor: pointer;
  transition: all .2s;
}
.feat-new-badge:hover {
  transform: scale(1.05);
  box-shadow: 0 2px 8px rgba(224,88,46,.2);
}
.feat-scroll {
  display: flex;
  gap: 10px;
  padding: 4px 14px 8px;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  scrollbar-width: none;
}
.feat-scroll::-webkit-scrollbar { display: none; }
.feat-card {
  min-width: 200px;
  max-width: 230px;
  flex-shrink: 0;
  background: var(--card-gradient);
  border-radius: var(--radius);
  padding: 12px;
  cursor: pointer;
  transition: all .3s cubic-bezier(.4,0,.2,1);
  border: 1px solid var(--border-light);
  box-shadow: var(--shadow-xs);
  scroll-snap-align: start;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.feat-card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-lift);
  border-color: #dedbd3;
}
.feat-card:active {
  transform: scale(.98);
}
.feat-img {
  width: 100%;
  height: 76px;
  border-radius: 12px;
  background: linear-gradient(135deg, #eef4ea 0%, #dce8d4 50%, #c8dcc0 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 38px;
  position: relative;
  overflow: hidden;
}
.feat-img::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 70% 30%, rgba(255,255,255,.25) 0%, transparent 60%);
  pointer-events: none;
}
.feat-info {
  display: flex;
  flex-direction: column;
  gap: 1px;
}
.feat-name {
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 1px;
}
.feat-tagline {
  font-size: 10.5px;
  color: var(--text-secondary);
  letter-spacing: .5px;
  line-height: 1.4;
}
.feat-bottom {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.feat-price {
  font-family: var(--font-serif);
  font-size: 17px;
  font-weight: 700;
  color: var(--green-dark);
}
.feat-price .yuan {
  font-size: 10px;
  font-weight: 400;
  color: var(--text-secondary);
  margin-right: 1px;
}
.feat-cta {
  font-size: 10px;
  padding: 5px 12px;
  border-radius: 12px;
  background: var(--green-dark);
  color: #e8f0e2;
  font-weight: 600;
  letter-spacing: 1px;
}

/* ── Product Section ── */
.plist { padding: 0 14px 6px; }
.ptitle {
  font-family: var(--font-serif);
  font-size: 17px;
  font-weight: 700;
  color: var(--text);
  padding: 20px 0 6px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  position: sticky;
  top: 0;
  background: var(--cream);
  z-index: 5;
  letter-spacing: 3px;
}
.ptitle::after {
  content: '';
  width: 22px;
  height: 1px;
  background: var(--border);
  margin-top: 2px;
}
.ptitle .count {
  font-size: 10px;
  color: var(--text-muted);
  font-weight: 400;
  letter-spacing: 1px;
}
.ptitle-sell {
  font-size: 10px;
  color: var(--text-muted);
  font-weight: 400;
  letter-spacing: .5px;
  opacity: .7;
}

.pgrid {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

/* ── Product Card ── */
.pcard {
  background: var(--card-gradient);
  padding: 14px;
  border-radius: var(--radius);
  cursor: pointer;
  transition: all .3s cubic-bezier(.4,0,.2,1);
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 12px;
  position: relative;
  border: 1px solid var(--border-light);
  box-shadow: var(--shadow-xs);
}
.pcard:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-lift);
  border-color: #dedbd3;
}
.pcard:active {
  transform: scale(.98);
  box-shadow: var(--shadow-sm);
}
.pcard .heart {
  position: absolute;
  top: 8px;
  right: 10px;
  font-size: 12px;
  cursor: pointer;
  z-index: 3;
  opacity: .3;
  transition: all .25s;
}
.pcard .heart.liked { opacity: 1; animation: heartPop .5s cubic-bezier(.17,.89,.32,1.49); }

.pimg {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: linear-gradient(135deg, #eef4ea 0%, #dce8d4 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  overflow: hidden;
  flex-shrink: 0;
  transition: transform .3s;
}
.pcard:active .pimg { transform: scale(.94); }
.pimg img { width:100%; height:100%; object-fit:cover; }

.pinfo {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.pname-row {
  display: flex;
  align-items: center;
  gap: 6px;
}
.pname {
  font-size: 13.5px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.3;
  letter-spacing: 1px;
  white-space: nowrap;
}
.pdesc {
  font-size: 10.5px;
  color: var(--text-muted);
  letter-spacing: .5px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.pprice {
  font-family: var(--font-serif);
  font-size: 17px;
  font-weight: 700;
  color: var(--green-dark);
  flex-shrink: 0;
}
.pprice .yuan { font-size: 11px; font-weight: 400; color: var(--text-secondary); margin-right:1px; }

/* ── Tags ── */
.ptag {
  font-size: 9px;
  padding: 1px 7px;
  border-radius: 8px;
  font-weight: 600;
  letter-spacing: .5px;
  flex-shrink: 0;
}
.ptag.pt-hot  { background: #f5ede0; color: #b8783e; }
.ptag.pt-best { background: #e4eedc; color: #3d6b28; }
.ptag.pt-new  { background: #e2eaf2; color: #4a6d8c; }

/* ── Add animation ── */
.padd-anim {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  font-size: 40px;
  pointer-events: none;
  z-index: 999;
  animation: flyUp .65s cubic-bezier(.4,0,.2,1) forwards;
}
@keyframes flyUp {
  0%   { opacity:1; transform:translate(-50%,-50%) scale(.5) rotate(-8deg); }
  50%  { opacity:1; transform:translate(-50%,-85%) scale(1.05); }
  100% { opacity:0; transform:translate(-50%,-200%) scale(.7); }
}

/* ── Modal ── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.22);
  backdrop-filter: blur(14px) saturate(1.2);
  -webkit-backdrop-filter: blur(14px) saturate(1.2);
  z-index: 200;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity .3s ease;
}
.modal-overlay.show { opacity:1; pointer-events:auto; }

.modal-sheet {
  background: var(--modal-glass);
  backdrop-filter: blur(20px) saturate(1.1);
  -webkit-backdrop-filter: blur(20px) saturate(1.1);
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  width: 100%;
  max-width: 480px;
  padding: 24px 18px 34px;
  max-height: 78vh;
  overflow-y: auto;
  animation: slideUp .35s cubic-bezier(.4,0,.2,1);
  box-shadow: var(--shadow-lg);
}
@keyframes slideUp {
  from { transform:translateY(100%); }
  to   { transform:translateY(0); }
}
.modal-sheet::before {
  content: '';
  display: block;
  width: 36px;
  height: 4px;
  background: rgba(0,0,0,.1);
  border-radius: 2px;
  margin: 0 auto 18px;
}

.modal-title {
  font-family: var(--font-serif);
  font-size: 17px;
  font-weight: 700;
  margin-bottom: 18px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  letter-spacing: 2px;
}
.modal-close {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: #f5f3ef;
  border: none;
  font-size: 16px;
  cursor: pointer;
  color: var(--text-secondary);
  transition: all .2s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.modal-close:hover { background: #e8e5df; color: var(--text); }

.opt-label {
  font-size: 11px;
  color: var(--text-secondary);
  margin: 16px 0 8px;
  font-weight: 500;
  letter-spacing: 1px;
}
.opt-row { display:flex; gap:8px; flex-wrap:wrap; }
.opt-tag {
  padding: 10px 16px;
  border-radius: var(--radius);
  font-size: 12px;
  border: 1px solid var(--border);
  background: var(--cream);
  cursor: pointer;
  transition: all .2s;
  font-weight: 500;
}
.opt-tag:hover:not(.active) {
  background: #f5f2ec;
  border-color: #d5d1c9;
}

.opt-tag.active {
  border-color: var(--green);
  background: linear-gradient(135deg, #eef4ea 0%, #dce8d4 100%);
  color: var(--green-dark);
  font-weight: 600;
}

.modal-product {
  display: flex;
  align-items: center;
  gap: 14px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border-light);
}
.modal-product .mpname {
  font-family: var(--font-serif);
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 1px;
}
.modal-product .mpprice {
  font-family: var(--font-serif);
  font-size: 22px;
  font-weight: 700;
  color: var(--green-dark);
  margin-top: 2px;
}
.mpdesc {
  font-size: 11.5px;
  color: var(--text-secondary);

    const cat=menu[f.ci],item=cat.items[f.ii];
    return {item,ci:f.ci,tagline:f.tagline};
  });
  scroll.innerHTML=cards.map(c=>`
    <div class="feat-card" onclick="openSpec(${c.ci},'${escapeHtml(c.item.n)}')">
      <div class="feat-img">${c.item.emoji}</div>
      <div class="feat-info">
        <div class="feat-name">${c.item.n}</div>
        <div class="feat-tagline">${c.tagline}</div>
      </div>
      <div class="feat-bottom">
        <div class="feat-price"><span class="yuan">¥</span>${c.item.p}</div>
        <div class="feat-cta">去尝尝</div>
      </div>
    </div>
  `).join('');
}

function renderAll(){
  document.getElementById('cats').innerHTML=menu.map((c,i)=>`<span class="ct ${i===activeCat?'active':''}" onclick="switchCat(${i})">${c.cat}</span>`).join('');
  renderFeatured();

  let html='';
  const sellCopy={0:'🥛 炭火慢烤，茶浓奶滑，治愈你的下午',1:'🍋 每杯爆打 30 次，维C炸弹一口回魂',2:'🍇 鲜果撞鲜柠，双倍果香，清爽不腻',3:'🥭 当季鲜果现榨，纯天然无添加'};
  menu.forEach((c,ci)=>{
    html+=`<div id="cat-${ci}" style="display:${ci===activeCat?'block':'none'}">`;
    html+=`<div class="ptitle">${c.cat}<span class="count">${c.items.length} 款</span><span class="ptitle-sell">${sellCopy[ci]}</span></div>`;
    html+=`<div class="pgrid">`;
    c.items.forEach((item,ii)=>{
      const bg=BGC[(ci*7+ii)%BGC.length];
      const liked=getLiked(item.n);
      const tagHtml=item.t?`<span class="ptag pt-${item.t}">${item.tt}</span>`:'';
      html+=`
        <div class="pcard" id="prod-${ci}-${ii}" onclick="openSpec(${ci},'${escapeHtml(item.n)}')">
          <div class="pimg" style="background:${bg}">${item.emoji}</div>
          <div class="pinfo">
            <div class="pname-row">
              <span class="pname">${item.n}</span>
              ${tagHtml}
            </div>
            <div class="pdesc">${item.d}</div>
          </div>
          <div class="pprice"><span class="yuan">¥</span>${item.p}</div>
          <span class="heart ${liked?'liked':''}" onclick="event.stopPropagation();toggleLike(this,'${escapeHtml(item.n)}')">${liked?'♥':'♡'}</span>
        </div>
      `;
    });
    html+=`</div></div>`;
  });
  document.getElementById('plist').innerHTML=html;
}

function getLiked(name){return localStorage.getItem('like_'+name)==='1'}
function toggleLike(el,name){
  const liked=!getLiked(name);
  localStorage.setItem('like_'+name,liked?'1':'0');
  el.textContent=liked?'♥':'♡';
  if(liked)el.classList.add('liked');else el.classList.remove('liked');
  showToast(liked?'已收藏':'取消收藏');
}

function openSpec(ci,name){
  const cat=menu[ci],item=cat.items.find(i=>i.n===name);
  if(!item)return;
  document.getElementById('specModal').classList.add('show');
  specItem={ci,name,item};
  document.getElementById('specProduct').innerHTML=`<div class="pimg" style="width:52px;height:52px;font-size:24px;background:linear-gradient(135deg, #eef4ea 0%, #dce8d4 100%)">${item.emoji}</div><div><div class="mpname">${item.n}</div><div class="mpprice">¥${item.p}</div><div class="mpdesc">${item.sd||''}</div></div>`;
  specSweet=0;specIce=0;
  document.getElementById('sweetOpts').innerHTML=['正常甜','七分甜','半糖','三分甜','无糖'].map((s,i)=>`<span class="opt-tag ${i===0?'active':''}" onclick="pickSweet(${i},this)">${s}</span>`).join('');
  document.getElementById('iceOpts').innerHTML=['正常冰','少冰','去冰','多冰'].map((s,i)=>`<span class="opt-tag ${i===0?'active':''}" onclick="pickIce(${i},this)">${s}</span>`).join('');
}
function pickSweet(i,el){specSweet=i;el.parentElement.querySelectorAll('.opt-tag').forEach(t=>t.classList.remove('active'));el.classList.add('active')}
function pickIce(i,el){specIce=i;el.parentElement.querySelectorAll('.opt-tag').forEach(t=>t.classList.remove('active'));el.classList.add('active')}
function closeSpec(){document.getElementById('specModal').classList.remove('show');specItem=null}

function confirmAdd(){
  if(!specItem)return;
  const sweetNames=['正常甜','七分甜','半糖','三分甜','无糖'],iceNames=['正常冰','少冰','去冰','多冰'];
  cart.push({name:specItem.name,emoji:specItem.item.emoji,price:specItem.item.p,qty:1,sweet:sweetNames[specSweet],ice:iceNames[specIce]});
  closeSpec();updateCartUI();showToast('已添加 '+specItem.name);
}

function cartTotal(){return cart.reduce((s,c)=>s+c.price*c.qty,0)}
function cartCount(){return cart.reduce((s,c)=>s+c.qty,0)}

function updateCartUI(){
  const c=cartCount(),t=cartTotal();
  const badge=document.getElementById('cartBadge');
  if(c>0){badge.style.display='flex';badge.textContent=c}else{badge.style.display='none'}
  document.getElementById('btotal').textContent='¥'+t.toFixed(2);

  const items=document.getElementById('cartItems'),empty=document.getElementById('cartEmpty'),sum=document.getElementById('cartSum'),tp=document.getElementById('cartTotalPrice');
  if(cart.length===0){items.innerHTML='';empty.style.display='block';sum.style.display='none'}
  else{empty.style.display='none';sum.style.display='block';tp.textContent='¥'+t.toFixed(2);
    items.innerHTML=cart.map((x,i)=>`<div class="cart-item"><div class="ci-icon">${x.emoji}</div><div class="ci-info"><div class="ci-name">${x.name}</div><div class="ci-spec">${x.sweet} / ${x.ice}</div></div><div class="qty"><button class="qb" onclick="changeQty(${i},-1)">−</button><span class="qn">${x.qty}</span><button class="qb" onclick="changeQty(${i},1)">+</button></div><div class="ci-price">¥${(x.price*x.qty).toFixed(2)}</div></div>`).join('');
  }
}
function changeQty(i,d){cart[i].qty+=d;if(cart[i].qty<=0)cart.splice(i,1);updateCartUI()}
function openCart(){document.getElementById('cartModal').classList.add('show');updateCartUI()}
function closeCart(){document.getElementById('cartModal').classList.remove('show')}

function checkout(){
  if(cart.length===0){showToast('购物车是空的');return}
  const t=cartTotal();
  const orderNo='LT'+Date.now().toString(36).toUpperCase();
  document.getElementById('payAmount').textContent='¥'+t.toFixed(2);
  document.getElementById('paySummary').innerHTML=
    '<div style="margin-bottom:4px">订单编号：<b>'+orderNo+'</b></div>'+
    cart.map((x,i)=>
    '<div>'+x.emoji+' <b>'+(i+1)+'. '+x.name+'</b> — '+x.sweet+' / '+x.ice+' — ¥'+(x.price*x.qty).toFixed(2)+'</div>'
  ).join('');
  document.getElementById('payModal').classList.add('show');
  closeCart();

  // PushPlus 微信通知
  fetch('https://www.pushplus.plus/send',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      token:'6bbe32ec284b40d3a8e35bb5da15c3e8',
      title:'柠家小铺 · 新订单',
      content:'<html><head><meta charset="utf-8"/></head><body><h3>订单详情</h3>'+
        cart.map((x,i)=>'<p><b>'+(i+1)+'. '+x.name+'</b><br/>'+x.sweet+' / '+x.ice+' · ¥'+(x.price*x.qty).toFixed(2)+'</p>').join('')+
        '<hr/><p style="font-size:18px;color:#2d5016"><b>合计：¥'+t.toFixed(2)+'</b></p><p>🕐 '+new Date().toLocaleString()+'</p></body></html>',
      template:'html'
    })
  }).catch(()=>{});
}

function confirmPay(){
  if(!confirm('请确认已在微信中完成付款\n\n点击「确定」表示已付款\n点击「取消」返回继续付款'))return;
  showToast('支付成功，感谢惠顾！');
  cart=[];updateCartUI();
  document.getElementById('payModal').classList.remove('show');
}

function closePay(){
  if(cart.length>0&&!confirm('确定关闭付款窗口吗？\n\n关闭后购物车不会被清空\n可稍后重新购买付款'))return;
  document.getElementById('payModal').classList.remove('show');
}

function switchCat(i){activeCat=i;renderAll();setTimeout(()=>{const el=document.getElementById('cat-'+i);if(el)el.scrollIntoView({behavior:'smooth'})},50)}

function toggleFav(){
  const btn=document.getElementById('favBtn'),liked=localStorage.getItem('shop_fav')==='1';
  localStorage.setItem('shop_fav',liked?'0':'1');
  btn.textContent=liked?'🤍':'♥';
  if(!liked)btn.classList.add('liked');else btn.classList.remove('liked');
  showToast(liked?'取消收藏':'已收藏店铺');
}

function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._tid);t._tid=setTimeout(()=>t.classList.remove('show'),1800)}
function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

let lastScroll=0;
window.addEventListener('scroll',()=>{
  const hdr=document.getElementById('header'),st=window.scrollY;
  if(st>60&&lastScroll<=60)hdr.classList.add('small');
  else if(st<=20&&lastScroll>20)hdr.classList.remove('small');
  lastScroll=st;
});

document.querySelectorAll('.modal-overlay').forEach(m=>m.addEventListener('click',function(e){if(e.target===this){this.classList.remove('show');if(this.id==='specModal')specItem=null}}));

// Hero display emoji — 2 emojis per product for visual richness
const heroEmoji={
  '原味奶茶':'🧋','益禾烤奶':'🔥🥛','珍珠奶茶':'🧋🫧',
  '红豆奶茶':'🫘🥛','椰果奶茶':'🥥✨','脆啵啵奶茶':'💎🧋',
  '烧仙草奶茶':'🌿🫙',
  '冰鲜柠檬茶':'🍋🧊','话梅柠檬茶':'🍑🍋','柠檬绿茶':'🍋🍵',
  '柠檬红茶':'🍋🫖','鸭屎香柠檬茶':'🍃🍋','青提柠檬茶':'🍇🍋',
  '西瓜柠檬茶':'🍉🍋',
  '芒果柠檬茶':'🥭🍋','桑葚柠檬茶':'🫐🍋','金桔柠檬茶':'🍊🍋',
  '百香果柠檬茶':'💛🍋','百香果金桔柠檬茶':'🍹💛','百香果双响炮':'🎉💥',
  '百香果益力多':'✨🧫','柠檬益力多':'🍋🧫','芒果益力多':'🥭🧫',
  '西瓜汁':'🍉','芒果汁':'🥭','芒果椰椰':'🥭🥥','西瓜椰椰':'🍉🥥',
};
const catGradients=[
  'linear-gradient(135deg, #fdf8f2 0%, #f5ede2 100%)',
  'linear-gradient(135deg, #f4f8f0 0%, #e6f0de 100%)',
  'linear-gradient(135deg, #faf7f0 0%, #f2ece0 100%)',
  'linear-gradient(135deg, #f8f4fa 0%, #ece0f2 100%)',
];

function populateHeroGrid(){
  // Collect all products, shuffle, pick 9
  const all=[];
  menu.forEach((c,ci)=>{c.items.forEach((item,ii)=>{all.push({ci,ii,item})})});
  for(let i=all.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[all[i],all[j]]=[all[j],all[i]]}
  const picked=all.slice(0,9);

  function cellHtml(p){
    const bg=catGradients[p.ci]||catGradients[0];
    const emoji=heroEmoji[p.item.n]||p.item.emoji||'·';
    return `<div class="grid-cell" style="background:${bg}" onclick="scrollToProduct(${p.ci},${p.ii})" title="${p.item.n} · ¥${p.item.p}">
      <span class="cell-emoji">${emoji}</span>
      <span class="cell-name">${p.item.n}</span>
      <span class="cell-price">¥${p.item.p}</span>
    </div>`;
  }

  // Distribute 9 items across 3 rows (3 per row)
  const rows=[[],[],[]];
  picked.forEach((p,i)=>rows[i%3].push(p));

  ['track1','track2','track3'].forEach((tid,i)=>{
    const row=rows[i];
    // 3 original × 4 copies = 12 cells to fill the track, no gaps
    const cells=[...row,...row,...row,...row].map(cellHtml).join('');
    document.getElementById(tid).innerHTML=cells;
  });
}

function flashAndScroll(ci,ii){
  const el=document.getElementById('prod-'+ci+'-'+ii);
  if(!el)return;
  el.scrollIntoView({behavior:'smooth',block:'center'});
  el.classList.add('flash');
  setTimeout(()=>el.classList.remove('flash'),700);
}

function scrollToProduct(ci,ii){
  if(activeCat!==ci){
    activeCat=ci;renderAll();
    setTimeout(()=>flashAndScroll(ci,ii),180);
  }else{
    flashAndScroll(ci,ii);
  }
}

function scrollToNew(){
  for(let ci=0;ci<menu.length;ci++){
    for(let ii=0;ii<menu[ci].items.length;ii++){
      if(menu[ci].items[ii].t==='new'){scrollToProduct(ci,ii);return}
    }
  }
}

(function init(){
  const f=localStorage.getItem('shop_fav')==='1';
  document.getElementById('favBtn').textContent=f?'♥':'🤍';
  if(f)document.getElementById('favBtn').classList.add('liked');
  populateHeroGrid();
  renderAll();updateCartUI();
})();
</script>
